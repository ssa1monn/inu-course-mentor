events {}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  client_max_body_size 25m;   # 종합시간표 엑셀 업로드 여유

  # 백엔드 업스트림 - 컨테이너 이름으로 참조 (IP 하드코딩 금지)
  upstream backend {
    server backend:4000;
  }

  # 프론트엔드(정적 React) 업스트림
  upstream frontend {
    server frontend:80;
  }

  server {
    listen 80;
    server_name _;

    # /api 요청만 백엔드로 프록시
    location /api/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 그 외 모든 요청은 프론트엔드(SPA)로
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
    }
  }
}
