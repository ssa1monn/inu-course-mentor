# INU Course Mentor - 전체 스택 오케스트레이션
# frontend / backend / db / proxy 4개 컨테이너. proxy(nginx)가 단일 진입점.

services:
  db:
    image: postgres:16-alpine
    container_name: inucm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - inucm-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inucm-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL}
      NCS_API_KEY: ${NCS_API_KEY}
      PORT: ${PORT}
      NODE_ENV: ${NODE_ENV}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - inucm-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inucm-frontend
    restart: unless-stopped
    networks:
      - inucm-net

  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: inucm-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - inucm-net

volumes:
  db-data:

networks:
  inucm-net:
    driver: bridge
