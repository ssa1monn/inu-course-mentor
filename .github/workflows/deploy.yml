name: Deploy

# main 브랜치 push 시 배포 서버에 SSH 접속하여 docker-compose를 갱신(자동 배포).
# 사용 전 GitHub Secrets에 등록 필요 (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST     = 서버 공인 IP (예: 165.22.52.6)
#   DEPLOY_USER     = root
#   DEPLOY_PASSWORD = droplet 비밀번호
#   DEPLOY_PATH     = /root/inu-course-mentor

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH (password)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            docker compose up -d --build
            docker image prune -f
